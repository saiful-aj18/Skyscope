<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet" />
    <title>Skyscope</title>
    <style type="text/tailwindcss">
      @theme {
        --font-sans: 'Syne', sans-serif;
        --font-mono: 'JetBrains Mono', monospace;
        --color-sky-glow: rgba(60,155,123,0.18);
        --animate-pulse-glow: pulse-glow 2.8s ease-in-out infinite;
        --animate-slide-up: slide-up 0.45s cubic-bezier(0.16,1,0.3,1) both;
      }
      @keyframes pulse-glow {
        0%,100% { box-shadow: 0 0 12px #38bdf8, 0 0 28px rgba(56,189,248,0.5); }
        50%      { box-shadow: 0 0 5px  #38bdf8, 0 0 10px rgba(56,189,248,0.15); }
      }
      @keyframes slide-up {
        from { opacity: 0; transform: translateY(14px); }
        to   { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>

  <body class="font-sans min-h-screen bg-[#020917] text-slate-100 flex items-center justify-center p-6
               bg-[radial-gradient(ellipse_80%_40%_at_50%_0%,rgba(15, 23, 42, ,transparent)]">

    
    <div class="fixed inset-0 pointer-events-none z-0
                bg-[radial-gradient(circle,rgba(255,255,255,0.04)_1px,transparent_1px)]
                [background-size:36px_36px]"></div>

    <main class="relative z-10 w-full max-w-[440px] flex flex-col gap-5">

      
      <div class="rounded-[28px] p-9
                  bg-white/[0.035] backdrop-blur-2xl
                  border border-white/[0.08]
                  shadow-[0_40px_80px_rgba(0,0,0,0.6),inset_0_0_0_0.5px_rgba(255,255,255,0.06),inset_0_1px_0_rgba(255,255,255,0.09)]">

        
        <div class="flex flex-col items-center gap-2.5 mb-7">
          <div class="flex items-center gap-3">
            
            <span class="w-2.5 h-2.5 rounded-full bg-sky-400 flex-shrink-0
                         animate-[pulse-glow_2.8s_ease-in-out_infinite]
                         shadow-[0_0_12px_#38bdf8,0_0_28px_rgba(56,189,248,0.5)]"></span>
            <h1 class="text-2xl font-bold tracking-tight text-white/95">Skyscope</h1>
          </div>
          <p class="text-[0.8rem] text-slate-400/80 text-center leading-relaxed">
            Real-time weather intelligence for any city worldwide
          </p>
        </div>

        
        <div class="h-px bg-gradient-to-r from-transparent via-white/[0.07] to-transparent mb-7"></div>

        
        <form id="weatherForm" class="flex flex-col gap-5">

          
          <div class="flex flex-col gap-2">
            <label for="countrySelect"
                   class="flex items-center gap-1.5 text-[0.65rem] font-semibold tracking-[0.1em] uppercase text-slate-500">
              
              <svg class="w-3.5 h-3.5 text-sky-500/60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
              </svg>
              Country
            </label>
            <div class="relative">
              
              <svg class="pointer-events-none absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-sky-400/55" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
              </svg>
              <select id="countrySelect" required
                class="w-full appearance-none rounded-2xl pl-11 pr-10 py-3.5
                       bg-white/[0.055] border border-white/[0.09] text-sm text-slate-300
                       font-sans cursor-pointer
                       hover:bg-white/[0.08] hover:border-white/[0.18]
                       focus:outline-none focus:border-sky-400/50 focus:bg-white/[0.09]
                       focus:shadow-[0_0_0_3px_rgba(56,189,248,0.1)]
                       transition-all duration-200">
                <option value="" class="bg-[#0f1e35] text-slate-300">Loading countries…</option>
              </select>
              
              <svg class="pointer-events-none absolute right-4 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-slate-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="6 9 12 15 18 9"/>
              </svg>
            </div>
          </div>

          
          <div class="flex flex-col gap-2">
            <label for="citySelect"
                   class="flex items-center gap-1.5 text-[0.65rem] font-semibold tracking-[0.1em] uppercase text-slate-500">
              
              <svg class="w-3.5 h-3.5 text-sky-500/60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 22V12h6v10M3 9h18M9 3v6M15 3v6"/>
              </svg>
              City
            </label>
            <div class="relative">
              
              <svg class="pointer-events-none absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-sky-400/55" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4"/>
              </svg>
              <select id="citySelect" required
                class="w-full appearance-none rounded-2xl pl-11 pr-10 py-3.5
                       bg-white/[0.055] border border-white/[0.09] text-sm text-slate-300
                       font-sans cursor-pointer
                       hover:bg-white/[0.08] hover:border-white/[0.18]
                       focus:outline-none focus:border-sky-400/50 focus:bg-white/[0.09]
                       focus:shadow-[0_0_0_3px_rgba(56,189,248,0.1)]
                       transition-all duration-200">
                <option value="" class="bg-[#0f1e35] text-slate-300">Select a country first</option>
              </select>
              <svg class="pointer-events-none absolute right-4 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-slate-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="6 9 12 15 18 9"/>
              </svg>
            </div>
          </div>

          
          <button type="submit"
            class="mt-1 flex items-center justify-center gap-2.5
                   rounded-2xl py-4 px-6
                   bg-gradient-to-r from-sky-600 via-sky-500 to-sky-400
                   text-white text-sm font-semibold tracking-wide
                   shadow-[0_4px_24px_rgba(14,165,233,0.42),inset_0_1px_0_rgba(255,255,255,0.18)]
                   hover:shadow-[0_8px_32px_rgba(14,165,233,0.6),inset_0_1px_0_rgba(255,255,255,0.18)]
                   hover:-translate-y-0.5
                   active:translate-y-0 active:brightness-95
                   transition-all duration-200 cursor-pointer">
            
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 6a6 6 0 0 1 6 6 6 6 0 0 1-1.75 4.24L20 20"/><circle cx="12" cy="12" r="6"/>
              <path d="M4.93 4.93A9 9 0 0 0 3 12a9 9 0 0 0 9 9"/>
            </svg>
            Get Weather Forecast
          </button>
        </form>

        
        <div id="message" class="mt-5 text-center text-[0.8rem] text-slate-400/70 min-h-5"></div>

        
        <div id="result" class="hidden animate-[slide-up_0.45s_cubic-bezier(0.16,1,0.3,1)_both]">

          <div class="h-px bg-gradient-to-r from-transparent via-white/[0.07] to-transparent my-6"></div>

          
          <div class="flex items-start justify-between mb-1">
            <h2 id="resultCity" class="text-base font-semibold text-white/95 flex items-center gap-2">
              <svg class="w-4 h-4 text-sky-400 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
              </svg>
            </h2>
            <span id="resultTime" class="font-mono text-[0.68rem] text-slate-500/70 mt-1"></span>
          </div>

          
          <div class="flex items-end justify-center my-5">
            <span id="resultTemp"
              class="font-mono font-light text-[5.5rem] leading-none tracking-tighter
                     bg-gradient-to-br from-white/95 via-white/80 to-sky-300
                     bg-clip-text text-transparent"></span>
          </div>

          
          <p id="resultDesc" class="text-center text-sm font-medium text-slate-300/90 capitalize mb-6"></p>

          
          <div class="grid grid-cols-3 gap-2.5">

            <div class="flex flex-col gap-1.5 rounded-2xl p-3.5
                        bg-white/[0.04] border border-white/[0.07]">
              <span class="flex items-center gap-1.5 text-[0.6rem] font-semibold tracking-[0.1em] uppercase text-slate-500">
                <svg class="w-3 h-3 text-sky-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"/>
                </svg>
                Wind
              </span>
              <span id="resultWind" class="text-[0.82rem] font-medium text-slate-200 pl-px"></span>
            </div>

            <div class="flex flex-col gap-1.5 rounded-2xl p-3.5
                        bg-white/[0.04] border border-white/[0.07]">
              <span class="flex items-center gap-1.5 text-[0.6rem] font-semibold tracking-[0.1em] uppercase text-slate-500">
                <svg class="w-3 h-3 text-sky-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/>
                </svg>
                Rain
              </span>
              <span id="resultRain" class="text-[0.82rem] font-medium text-slate-200 pl-px"></span>
            </div>

            <div class="flex flex-col gap-1.5 rounded-2xl p-3.5
                        bg-white/[0.04] border border-white/[0.07]">
              <span class="flex items-center gap-1.5 text-[0.6rem] font-semibold tracking-[0.1em] uppercase text-slate-500">
                <svg class="w-3 h-3 text-sky-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/>
                </svg>
                Humidity
              </span>
              <span id="resultHumidity" class="text-[0.82rem] font-medium text-slate-200 pl-px"></span>
            </div>

          </div>
        </div>

      </div>

      
      <p class="text-center text-[0.68rem] tracking-wider text-slate-700">
        Powered by Open-Meteo &middot; Skyscope v1.0
      </p>

    </main>

    <script src="./script.js"></script>
  </body>
</html>
